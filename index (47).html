<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODYX - Where Power Meets Performance</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function BodyXWebsite() {
            const [activeTab, setActiveTab] = useState('spectator');
            const [cartItems, setCartItems] = useState({});
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');
            const [availableTickets, setAvailableTickets] = useState({});

            // Direct image URLs from your Cloudinary folder
            const cloudinaryImages = [
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513077/DSC07000_3_qocw1l.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513070/DSC06938_3_pd92n5.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513080/DSC068030_3_bguuks.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513054/DSC06853_3_a3iw3w.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513024/DSC06630_3_uas18r.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513025/DSC06780_3_sbduor.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512983/DSC06477_3_vskqwz.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512867/DSC05924_3_woclkh.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512865/DSC05897_3_vhgakx.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512896/DSC06028_3_x50fac.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512878/DSC05999_3_j2sku0.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512831/DSC05751_3_digd8h.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512823/DSC05437_3_k9fycf.jpg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512757/0276BAAC-53B7-4EBA-BE42-1939D4CE055B_nifzmm.png',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776512816/DSC05516_3_t5ggus.jpg',
            ];

            const stations = [
                {
                    num: 1,
                    name: 'Team Relay Run',
                    description: '9km total (3km per person)',
                    details: 'Each team member runs 3km in relay style. Total distance: 9km'
                },
                {
                    num: 2,
                    name: 'Pull & Push Zone',
                    description: 'Rings, push ups, deadlifts',
                    details: '60 reps pull ups using rings • 150 reps push ups • 60 reps 100kg deadlifts'
                },
                {
                    num: 3,
                    name: 'Lower Body Burn',
                    description: 'Squats, lunges, step overs',
                    details: '300 air squats • 50kg weighted lunges (100m) • 150 reps body weight step overs'
                },
                {
                    num: 4,
                    name: 'Core Zone',
                    description: 'V ups, knee raises, planks',
                    details: '150 v ups • 150 knee raises • 3 minutes elbow planks'
                },
                {
                    num: 5,
                    name: 'Carry Zone',
                    description: 'Loaded carries at 100m each',
                    details: '30kg farmers carry (100m) • 25kg overhead plates carry (100m) • 40kg Zercher carry (100m)'
                },
                {
                    num: 6,
                    name: 'Synchronized Challenge',
                    description: 'Team coordination & power',
                    details: '15 reps synchronized burpees • 60 reps synchronized squats • 1 minute team sit together'
                },
                {
                    num: 7,
                    name: 'Final Push',
                    description: 'Sled & rope',
                    details: '400m sled push • 6x 15m rope climbs (15 meters each)'
                }
            ];

            // Smart ticket pricing based on date
            useEffect(() => {
                const today = new Date();
                const aprilEnd = new Date(2026, 3, 30);
                const juneEleven = new Date(2026, 5, 11);
                const junetwelve = new Date(2026, 5, 12);

                const available = {};
                
                // Early bird: only until April 30
                if (today <= aprilEnd) {
                    available['early-bird'] = true;
                }
                // Regular: May 1 through June 11
                if (today >= new Date(2026, 4, 1) && today <= juneEleven) {
                    available['regular'] = true;
                }
                // Door: June 12 only
                if (today >= junetwelve) {
                    available['door'] = true;
                }
                
                // Team entry always available
                available['team'] = true;

                setAvailableTickets(available);
            }, []);

            const ticketPricing = {
                spectator: [
                    { id: 'early-bird', name: 'Early Bird', price: 7000, period: 'Until April 30' },
                    { id: 'regular', name: 'Regular', price: 10000, period: 'May 1 - June 11' },
                    { id: 'door', name: 'Door', price: 15000, period: 'June 12 Only' },
                ],
                team: [
                    { id: 'team', name: 'Team (3 athletes - coed)', price: 150000, period: 'Per team' },
                ],
            };

            const addToCart = (tierId) => {
                setCartItems(prev => ({
                    ...prev,
                    [tierId]: (prev[tierId] || 0) + 1
                }));
            };

            const removeFromCart = (tierId) => {
                setCartItems(prev => {
                    const updated = { ...prev };
                    if (updated[tierId] > 1) {
                        updated[tierId]--;
                    } else {
                        delete updated[tierId];
                    }
                    return updated;
                });
            };

            const getTotalPrice = () => {
                let total = 0;
                const pricingList = activeTab === 'spectator' ? ticketPricing.spectator : ticketPricing.team;
                Object.entries(cartItems).forEach(([tierId, quantity]) => {
                    const tier = pricingList.find(t => t.id === tierId);
                    if (tier) {
                        total += tier.price * quantity;
                    }
                });
                return total;
            };

            const getTotalQuantity = () => {
                return Object.values(cartItems).reduce((sum, qty) => sum + qty, 0);
            };

            const handleCheckout = async () => {
                if (getTotalQuantity() === 0) {
                    setMessage('Please add tickets to your cart');
                    return;
                }

                // Redirect to Paystack shop with pre-filled amount
                const totalPrice = getTotalPrice();
                window.location.href = `https://paystack.shop/pay/bodyx?amount=${totalPrice}`;
            };

            return (
                <div className="min-h-screen bg-black text-white overflow-hidden">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full bg-black/95 backdrop-blur-sm z-50 border-b border-lime-500/20">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="text-2xl font-black bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">
                                BODYX
                            </div>
                            <div className="hidden md:flex gap-8 text-sm">
                                <a href="#about" className="hover:text-lime-400 transition">About</a>
                                <a href="#leaderboard" className="hover:text-lime-400 transition">Results</a>
                                <a href="#stations" className="hover:text-lime-400 transition">Stations</a>
                                <a href="#gallery" className="hover:text-lime-400 transition">Gallery</a>
                                <a href="#tickets" className="hover:text-lime-400 transition">Tickets</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="relative pt-32 pb-20 px-6 overflow-hidden">
                        <div className="absolute inset-0 opacity-20">
                            <div className="absolute top-10 left-10 w-96 h-96 bg-lime-500 rounded-full blur-3xl animate-pulse"></div>
                            <div className="absolute bottom-10 right-10 w-96 h-96 bg-green-500 rounded-full blur-3xl animate-pulse"></div>
                        </div>

                        <div className="relative z-10 max-w-6xl mx-auto text-center">
                            <h1 className="text-7xl md:text-8xl font-black mb-4 tracking-tighter">
                                <span className="bg-gradient-to-r from-lime-300 via-lime-400 to-lime-500 bg-clip-text text-transparent">BODYX</span>
                            </h1>
                            <p className="text-2xl md:text-3xl font-bold text-lime-400 mb-8">WHERE POWER MEETS PERFORMANCE</p>
                            <p className="text-lg text-gray-300 max-w-3xl mx-auto mb-12 leading-relaxed">
                                The 2nd edition of Lagos's most intense community fitness challenge. 7 stations. 3-person coed teams. ₦2.575M prize pool. June 12, 2026.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center mb-12">
                                <a href="#tickets" className="px-8 py-4 bg-gradient-to-r from-lime-400 to-lime-500 text-black font-bold rounded-lg hover:shadow-2xl hover:shadow-lime-500/50 transition transform hover:scale-105">
                                    BUY TICKETS NOW
                                </a>
                                <a href="#stations" className="px-8 py-4 border-2 border-lime-400 text-lime-400 font-bold rounded-lg hover:bg-lime-400/10 transition">
                                    SEE THE CHALLENGE
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* About */}
                    <section id="about" className="py-20 px-6 bg-white/5 backdrop-blur-sm">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">WHAT IS BODYX?</span>
                            </h2>
                            <div className="space-y-6">
                                <p className="text-lg text-gray-200 leading-relaxed">
                                    BodyX is more than a competition—it's a celebration of collective strength, teamwork, and pushing beyond limits. 7 challenging stations designed to test every system.
                                </p>
                                <p className="text-lg text-gray-200 leading-relaxed">
                                    Teams of three compete for supremacy—each team must be coed (minimum 1 male, 1 female, and 1 more athlete of any gender). Race through stations combining strength, endurance, and speed.
                                </p>
                                <div className="space-y-4 mt-8">
                                    <div className="flex gap-3">
                                        <span className="text-gray-300"><span className="font-bold text-lime-400">Format:</span> 3-person coed teams • 7 stations</span>
                                    </div>
                                    <div className="flex gap-3">
                                        <span className="text-gray-300"><span className="font-bold text-lime-400">Prize Pool:</span> ₦2.575M in winnings</span>
                                    </div>
                                    <div className="flex gap-3">
                                        <span className="text-gray-300"><span className="font-bold text-lime-400">Date:</span> June 12, 2026 • Sweatbox Lagos</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Leaderboard */}
                    <section id="leaderboard" className="py-20 px-6">
                        <div className="max-w-6xl mx-auto">
                            <h2 className="text-5xl font-black mb-4 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">LEADERBOARD</span>
                            </h2>
                            <p className="text-center text-gray-400 mb-12">BodyX 1st Edition Results</p>

                            <div className="space-y-4">
                                {[
                                    { position: 1, medal: '🥇', name: 'Undisputed', location: 'N/A', time: '37:00', image: 'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513070/DSC06938_3_pd92n5.jpg' },
                                    { position: 2, medal: '🥈', name: 'Power Surge', location: 'N/A', time: '41:00', image: 'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513070/DSC06930_3_ynohde.jpg' },
                                    { position: 3, medal: '🥉', name: 'I am Fit', location: 'Magodo', time: '45:00', image: 'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1776513054/DSC06853_3_a3iw3w.jpg' },
                                    { position: 4, name: 'Razzie', location: 'N/A', time: '47:04', image: null },
                                    { position: 5, name: 'Muscle Bandit', location: 'N/A', time: '48:46', image: null },
                                    { position: 6, name: 'I am Fit', location: 'Ajah', time: '49:00', image: null },
                                    { position: 7, name: 'Powerhouse', location: 'N/A', time: '50:15', image: null },
                                ].map((team, idx) => (
                                    <div key={idx} className={`bg-gradient-to-br border rounded-lg p-6 transition ${team.position <= 3 ? 'from-white/10 to-white/5 border-lime-500/30 hover:border-lime-400 hover:shadow-2xl hover:shadow-lime-500/20' : 'from-white/5 to-white/3 border-lime-500/20'}`}>
                                        <div className="flex items-center gap-6">
                                            {/* Position Badge */}
                                            <div className={`w-16 h-16 rounded-full flex items-center justify-center font-black text-2xl flex-shrink-0 ${
                                                team.position === 1 ? 'bg-amber-500/30 text-amber-300' :
                                                team.position === 2 ? 'bg-gray-400/30 text-gray-200' :
                                                team.position === 3 ? 'bg-orange-600/30 text-orange-300' :
                                                'bg-lime-500/20 text-lime-400'
                                            }`}>
                                                {team.medal || team.position}
                                            </div>

                                            {/* Team Info */}
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3 mb-2">
                                                    <h3 className="text-2xl font-bold">{team.name}</h3>
                                                    {team.image && (
                                                        <img src={team.image} alt={team.name} className="w-12 h-12 rounded-full object-cover border border-lime-500/30" />
                                                    )}
                                                </div>
                                                <p className="text-gray-400 text-sm">{team.location}</p>
                                            </div>

                                            {/* Time */}
                                            <div className="text-right flex-shrink-0">
                                                <p className="text-3xl font-black text-lime-400">{team.time}</p>
                                                <p className="text-xs text-gray-400">Finish Time</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="mt-8 text-center text-gray-400 text-sm">
                                <p>These are the results from BodyX 1st Edition. Will you make it to the podium in the 2nd Edition?</p>
                            </div>
                        </div>
                    </section>
                    <section id="stations" className="py-20 px-6">
                        <div className="max-w-6xl mx-auto">
                            <h2 className="text-5xl font-black mb-4 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">7 STATIONS</span>
                            </h2>
                            <p className="text-center text-gray-400 mb-12">THE COMPLETE CHALLENGE</p>

                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {stations.map((station, idx) => (
                                    <div key={idx} className="bg-gradient-to-br from-white/10 to-white/5 border border-lime-500/30 rounded-lg p-6 hover:border-lime-400 hover:shadow-2xl hover:shadow-lime-500/20 transition">
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="w-12 h-12 rounded-full bg-lime-500 text-black flex items-center justify-center font-black text-lg">
                                                {station.num}
                                            </div>
                                            <h3 className="text-xl font-bold">{station.name}</h3>
                                        </div>
                                        <p className="text-sm text-lime-400 font-semibold mb-3">{station.description}</p>
                                        <p className="text-sm text-gray-300 leading-relaxed">{station.details}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Gallery */}
                    <section id="gallery" className="py-20 px-6 bg-white/5">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">THE ACTION</span>
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-[250px]">
                                {cloudinaryImages.map((img, idx) => (
                                    <div key={idx} className="relative overflow-hidden rounded-lg shadow-xl hover:shadow-2xl hover:shadow-lime-500/30 transition group cursor-pointer bg-white/5" style={{ gridRow: idx % 5 === 0 ? 'span 2' : 'span 1', gridColumn: idx % 7 === 0 ? 'span 2' : 'span 1' }}>
                                        <img src={img} alt={`BodyX Event ${idx}`} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" loading="lazy" />
                                        <div className="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition"></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Prize Pool */}
                    <section className="py-20 px-6">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">PRIZE POOL</span>
                            </h2>
                            <div className="grid md:grid-cols-3 gap-6">
                                {[
                                    { place: '1ST PLACE', amount: '₦1,500,000', emoji: '🥇' },
                                    { place: '2ND PLACE', amount: '₦750,000', emoji: '🥈' },
                                    { place: '3RD PLACE', amount: '₦325,000', emoji: '🥉' },
                                ].map((prize, idx) => (
                                    <div key={idx} className={`bg-gradient-to-br from-white/10 to-white/5 border border-lime-500/30 rounded-lg p-8 text-center transition ${idx === 0 ? 'ring-2 ring-lime-500' : ''}`}>
                                        <p className="text-sm text-gray-400 mb-3">{prize.emoji} {prize.place}</p>
                                        <p className="text-4xl font-black text-lime-400 mb-2">{prize.amount}</p>
                                    </div>
                                ))}
                            </div>
                            <p className="text-center text-gray-400 mt-8">Total Prize Pool: ₦2,575,000</p>
                        </div>
                    </section>

                    {/* Tickets */}
                    <section id="tickets" className="py-20 px-6 bg-white/5 backdrop-blur-sm">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">GET YOUR TICKETS</span>
                            </h2>

                            <div className="flex gap-4 justify-center mb-12">
                                <button onClick={() => { setActiveTab('spectator'); setCartItems({}); }} className={`px-8 py-3 font-bold rounded-lg transition ${activeTab === 'spectator' ? 'bg-lime-500 text-black' : 'bg-white/10 border border-lime-500/30 text-lime-400 hover:bg-white/20'}`}>
                                    SPECTATOR
                                </button>
                                <button onClick={() => { setActiveTab('team'); setCartItems({}); }} className={`px-8 py-3 font-bold rounded-lg transition ${activeTab === 'team' ? 'bg-lime-500 text-black' : 'bg-white/10 border border-lime-500/30 text-lime-400 hover:bg-white/20'}`}>
                                    COMPETE (TEAM)
                                </button>
                            </div>

                            <div className="grid md:grid-cols-3 gap-6 mb-12">
                                {ticketPricing[activeTab].map((tier, idx) => {
                                    const isAvailable = availableTickets[tier.id];
                                    return isAvailable ? (
                                        <div key={idx} className="bg-gradient-to-br from-white/10 to-white/5 border border-lime-500/30 rounded-lg p-8 hover:border-lime-400 hover:shadow-2xl hover:shadow-lime-500/20 transition transform hover:scale-105">
                                            <h3 className="text-xl font-bold mb-2">{tier.name}</h3>
                                            <p className="text-sm text-lime-400 font-semibold mb-6">{tier.period}</p>
                                            <div className="mb-8">
                                                <p className="text-4xl font-black text-lime-400">₦{tier.price.toLocaleString()}</p>
                                            </div>
                                            <div className="flex items-center justify-between mb-4 bg-white/5 rounded p-3">
                                                <button onClick={() => removeFromCart(tier.id)} className="text-lime-400 hover:text-lime-300">−</button>
                                                <span className="font-bold">{cartItems[tier.id] || 0}</span>
                                                <button onClick={() => addToCart(tier.id)} className="text-lime-400 hover:text-lime-300">+</button>
                                            </div>
                                            <p className="text-xs text-gray-400 text-center">Secure your spot</p>
                                        </div>
                                    ) : null;
                                })}
                            </div>

                            {getTotalQuantity() > 0 && (
                                <div className="bg-lime-500/10 border border-lime-500/30 rounded-lg p-6 mb-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <p className="text-lg font-bold">{getTotalQuantity()} ticket{getTotalQuantity() > 1 ? 's' : ''} selected</p>
                                        <p className="text-3xl font-black text-lime-400">₦{getTotalPrice().toLocaleString()}</p>
                                    </div>
                                    {message && <p className="text-center mb-4 text-sm" style={{ color: message.includes('successful') ? '#86efac' : '#fca5a5' }}>{message}</p>}
                                    <button onClick={handleCheckout} className="w-full py-3 bg-lime-500 text-black font-bold rounded-lg hover:bg-lime-400 transition flex items-center justify-center gap-2">
                                        PROCEED TO CHECKOUT
                                    </button>
                                </div>
                            )}

                            <div className="bg-lime-500/10 border border-lime-500/30 rounded-lg p-6 text-center">
                                <p className="text-gray-300"><span className="font-bold text-lime-400">Early bird pricing ends April 30.</span> Limited spots available at ₦7,000. Secure yours now.</p>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="border-t border-white/10 py-8 px-6 text-center text-sm text-gray-500">
                        <p>BODYX 2nd Edition | June 12, 2026 | Sweatbox Lagos</p>
                        <p className="mt-2">WHERE POWER MEETS PERFORMANCE</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<BodyXWebsite />);
    </script>
</body>
</html>
