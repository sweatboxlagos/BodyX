<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODYX - Where Power Meets Performance</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function BodyXWebsite() {
            const [activeTab, setActiveTab] = useState('spectator');
            const [cartItems, setCartItems] = useState({});
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState('');

            const cloudinaryImages = [
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/F288E4C5-C057-4E5A-BC09-FCEC71C2ED98_o3kqzc.png',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/99633788-6C2C-460D-8AA5-1221F4B1BF69_hlrjd1.png',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/4A81826E-5B31-47C3-9D04-BDE570A68802_qvwxp8.png',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05398_zxcvbn.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05437_asdfgh.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05599_qwerty.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05533_uioplk.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05516_mnbvcx.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05661_poiuyt.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05691_lkjhgf.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05698_dfghjk.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05833_sdfghj.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05846_zxcvbn.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05716_qazwsx.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05751_edcrfv.jpeg',
                'https://res.cloudinary.com/dw3kvzu9i/image/upload/v1/98156d127706fb439590ea3b598b7469/DSC05769_tgyhuij.jpeg',
            ];

            const ticketPricing = {
                spectator: [
                    { id: 'early-bird', name: 'Early Bird', price: 7000, period: 'Limited time' },
                    { id: 'regular', name: 'Regular', price: 10000, period: 'Standard' },
                    { id: 'door', name: 'Door', price: 15000, period: 'At venue' },
                ],
                team: [
                    { id: 'team', name: 'Team (3 athletes - coed)', price: 150000, period: 'Per team' },
                ],
            };

            const addToCart = (tierId) => {
                setCartItems(prev => ({
                    ...prev,
                    [tierId]: (prev[tierId] || 0) + 1
                }));
            };

            const removeFromCart = (tierId) => {
                setCartItems(prev => {
                    const updated = { ...prev };
                    if (updated[tierId] > 1) {
                        updated[tierId]--;
                    } else {
                        delete updated[tierId];
                    }
                    return updated;
                });
            };

            const getTotalPrice = () => {
                let total = 0;
                const pricingList = activeTab === 'spectator' ? ticketPricing.spectator : ticketPricing.team;
                Object.entries(cartItems).forEach(([tierId, quantity]) => {
                    const tier = pricingList.find(t => t.id === tierId);
                    if (tier) {
                        total += tier.price * quantity;
                    }
                });
                return total;
            };

            const getTotalQuantity = () => {
                return Object.values(cartItems).reduce((sum, qty) => sum + qty, 0);
            };

            const handleCheckout = async () => {
                if (getTotalQuantity() === 0) {
                    setMessage('Please add tickets to your cart');
                    return;
                }

                setLoading(true);
                const totalPrice = getTotalPrice();

                try {
                    const script = document.createElement('script');
                    script.src = 'https://js.paystack.co/v1/inline.js';
                    script.onload = () => {
                        if (window.PaystackPop) {
                            const handler = window.PaystackPop.setup({
                                key: 'pk_live_ca576257627d6d1b7aed3753f4a896b62f9289f5',
                                email: 'bodyx@sweatboxlagos.com',
                                amount: totalPrice * 100,
                                ref: `BODYX-${Date.now()}`,
                                onClose: function() {
                                    setLoading(false);
                                    setMessage('Payment window closed.');
                                },
                                onSuccess: function(response) {
                                    setLoading(false);
                                    setMessage(`Payment successful! Reference: ${response.reference}`);
                                    setCartItems({});
                                }
                            });
                            handler.openIframe();
                        }
                    };
                    document.body.appendChild(script);
                } catch (error) {
                    setLoading(false);
                    setMessage('Error processing payment. Please try again.');
                }
            };

            return (
                <div className="min-h-screen bg-black text-white overflow-hidden">
                    {/* Navigation */}
                    <nav className="fixed top-0 w-full bg-black/95 backdrop-blur-sm z-50 border-b border-lime-500/20">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                            <div className="text-2xl font-black bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">
                                BODYX
                            </div>
                            <div className="hidden md:flex gap-8 text-sm">
                                <a href="#about" className="hover:text-lime-400 transition">About</a>
                                <a href="#gallery" className="hover:text-lime-400 transition">Gallery</a>
                                <a href="#tickets" className="hover:text-lime-400 transition">Tickets</a>
                                <a href="#faq" className="hover:text-lime-400 transition">FAQ</a>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <section className="relative pt-32 pb-20 px-6 overflow-hidden">
                        <div className="absolute inset-0 opacity-20">
                            <div className="absolute top-10 left-10 w-96 h-96 bg-lime-500 rounded-full blur-3xl animate-pulse"></div>
                            <div className="absolute bottom-10 right-10 w-96 h-96 bg-green-500 rounded-full blur-3xl animate-pulse"></div>
                        </div>

                        <div className="relative z-10 max-w-6xl mx-auto text-center">
                            <div className="mb-6 flex justify-center">
                                <img src={cloudinaryImages[0]} alt="BodyX Logo" className="h-32 drop-shadow-2xl" />
                            </div>
                            <h1 className="text-7xl md:text-8xl font-black mb-4 tracking-tighter">
                                <span className="bg-gradient-to-r from-lime-300 via-lime-400 to-lime-500 bg-clip-text text-transparent">BODYX</span>
                            </h1>
                            <p className="text-2xl md:text-3xl font-bold text-lime-400 mb-8">WHERE POWER MEETS PERFORMANCE</p>
                            <p className="text-lg text-gray-300 max-w-3xl mx-auto mb-12 leading-relaxed">
                                The 2nd edition of Lagos's most intense community fitness challenge. Assemble your team. Test collective strength, endurance, and resilience. Compete for glory and prize money. Bring your best.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center mb-12">
                                <a href="#tickets" className="px-8 py-4 bg-gradient-to-r from-lime-400 to-lime-500 text-black font-bold rounded-lg hover:shadow-2xl hover:shadow-lime-500/50 transition transform hover:scale-105">
                                    BUY TICKETS NOW
                                </a>
                                <a href="#about" className="px-8 py-4 border-2 border-lime-400 text-lime-400 font-bold rounded-lg hover:bg-lime-400/10 transition">
                                    LEARN MORE
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* About */}
                    <section id="about" className="py-20 px-6 bg-white/5 backdrop-blur-sm">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">WHAT IS BODYX?</span>
                            </h2>
                            <div className="grid md:grid-cols-2 gap-12 items-center">
                                <div>
                                    <img src={cloudinaryImages[2]} alt="BodyX Medal" className="w-full rounded-lg shadow-2xl shadow-lime-500/30" />
                                </div>
                                <div className="space-y-6">
                                    <p className="text-lg text-gray-200 leading-relaxed">
                                        BodyX is more than a competition—it's a celebration of collective strength, teamwork, and pushing beyond limits. Team-based fitness challenges combined with the energy and grit of Lagos.
                                    </p>
                                    <p className="text-lg text-gray-200 leading-relaxed">
                                        Teams of three compete for supremacy—each team must be coed (minimum 1 male, 1 female, and 1 more athlete of any gender). Whether you're seasoned athletes or fitness enthusiasts ready to test yourselves together, BodyX brings the best team-based fitness challenges to one stage.
                                    </p>
                                    <div className="space-y-4 mt-8">
                                        <div className="flex gap-3">
                                            <span className="text-gray-300"><span className="font-bold text-lime-400">Team-Based:</span> 3-person coed teams (min. 1 male, 1 female)</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <span className="text-gray-300"><span className="font-bold text-lime-400">Prize Pool:</span> ₦2.575M in total winnings</span>
                                        </div>
                                        <div className="flex gap-3">
                                            <span className="text-gray-300"><span className="font-bold text-lime-400">Execution:</span> Sweatbox Lagos precision meets performance</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Gallery */}
                    <section id="gallery" className="py-20 px-6">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">THE ACTION</span>
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-[250px]">
                                {cloudinaryImages.map((img, idx) => (
                                    <div key={idx} className="relative overflow-hidden rounded-lg shadow-xl hover:shadow-2xl hover:shadow-lime-500/30 transition group cursor-pointer" style={{ gridRow: idx % 5 === 0 ? 'span 2' : 'span 1', gridColumn: idx % 7 === 0 ? 'span 2' : 'span 1' }}>
                                        <img src={img} alt={`BodyX Event ${idx}`} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" loading="lazy" />
                                        <div className="absolute inset-0 bg-black/40 group-hover:bg-black/20 transition"></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Prize Pool */}
                    <section className="py-20 px-6">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">PRIZE POOL</span>
                            </h2>
                            <div className="grid md:grid-cols-3 gap-6">
                                {[
                                    { place: '1ST PLACE', amount: '₦1,500,000', emoji: '🥇' },
                                    { place: '2ND PLACE', amount: '₦750,000', emoji: '🥈' },
                                    { place: '3RD PLACE', amount: '₦325,000', emoji: '🥉' },
                                ].map((prize, idx) => (
                                    <div key={idx} className={`bg-gradient-to-br from-white/10 to-white/5 border border-lime-500/30 rounded-lg p-8 text-center transition ${idx === 0 ? 'ring-2 ring-lime-500' : ''}`}>
                                        <p className="text-sm text-gray-400 mb-3">{prize.emoji} {prize.place}</p>
                                        <p className="text-4xl font-black text-lime-400 mb-2">{prize.amount}</p>
                                        <p className="text-xs text-gray-500">Total Prize Pool: ₦2,575,000</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Tickets */}
                    <section id="tickets" className="py-20 px-6 bg-white/5 backdrop-blur-sm">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-5xl font-black mb-12 text-center">
                                <span className="bg-gradient-to-r from-lime-400 to-lime-500 bg-clip-text text-transparent">GET YOUR TICKETS</span>
                            </h2>

                            <div className="flex gap-4 justify-center mb-12">
                                <button onClick={() => { setActiveTab('spectator'); setCartItems({}); }} className={`px-8 py-3 font-bold rounded-lg transition ${activeTab === 'spectator' ? 'bg-lime-500 text-black' : 'bg-white/10 border border-lime-500/30 text-lime-400 hover:bg-white/20'}`}>
                                    SPECTATOR
                                </button>
                                <button onClick={() => { setActiveTab('team'); setCartItems({}); }} className={`px-8 py-3 font-bold rounded-lg transition ${activeTab === 'team' ? 'bg-lime-500 text-black' : 'bg-white/10 border border-lime-500/30 text-lime-400 hover:bg-white/20'}`}>
                                    COMPETE (TEAM)
                                </button>
                            </div>

                            <div className="grid md:grid-cols-3 gap-6 mb-12">
                                {ticketPricing[activeTab].map((tier, idx) => (
                                    <div key={idx} className="bg-gradient-to-br from-white/10 to-white/5 border border-lime-500/30 rounded-lg p-8 hover:border-lime-400 hover:shadow-2xl hover:shadow-lime-500/20 transition transform hover:scale-105">
                                        <h3 className="text-xl font-bold mb-2">{tier.name}</h3>
                                        <p className="text-sm text-gray-400 mb-6">{tier.period}</p>
                                        <div className="mb-8">
                                            <p className="text-4xl font-black text-lime-400">₦{tier.price.toLocaleString()}</p>
                                        </div>
                                        <div className="flex items-center justify-between mb-4 bg-white/5 rounded p-3">
                                            <button onClick={() => removeFromCart(tier.id)} className="text-lime-400 hover:text-lime-300">−</button>
                                            <span className="font-bold">{cartItems[tier.id] || 0}</span>
                                            <button onClick={() => addToCart(tier.id)} className="text-lime-400 hover:text-lime-300">+</button>
                                        </div>
                                        <p className="text-xs text-gray-400 text-center">Secure your spot</p>
                                    </div>
                                ))}
                            </div>

                            {getTotalQuantity() > 0 && (
                                <div className="bg-lime-500/10 border border-lime-500/30 rounded-lg p-6 mb-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <p className="text-lg font-bold">{getTotalQuantity()} ticket{getTotalQuantity() > 1 ? 's' : ''} selected</p>
                                        <p className="text-3xl font-black text-lime-400">₦{getTotalPrice().toLocaleString()}</p>
                                    </div>
                                    {message && <p className="text-center mb-4 text-sm" style={{ color: message.includes('successful') ? '#86efac' : '#fca5a5' }}>{message}</p>}
                                    <button onClick={handleCheckout} disabled={loading} className="w-full py-3 bg-lime-500 text-black font-bold rounded-lg hover:bg-lime-400 transition disabled:opacity-50 flex items-center justify-center gap-2">
                                        {loading ? <>⏳ Processing...</> : 'COMPLETE PURCHASE'}
                                    </button>
                                </div>
                            )}

                            <div className="bg-lime-500/10 border border-lime-500/30 rounded-lg p-6 text-center">
                                <p className="text-gray-300"><span className="font-bold text-lime-400">Early bird spectator tickets</span> at ₦7,000 are limited. Prices increase as event approaches.</p>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="border-t border-white/10 py-8 px-6 text-center text-sm text-gray-500">
                        <p>BODYX 2nd Edition | Sweatbox Lagos</p>
                        <p className="mt-2">WHERE POWER MEETS PERFORMANCE</p>
                    </footer>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<BodyXWebsite />);
    </script>
</body>
</html>
